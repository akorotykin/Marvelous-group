<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Агентство — MARVELOUS GROUP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css"/>
<style>
  .stub{
    min-height:100svh;
    padding: 120px var(--pad-x) 80px;
    display:flex; flex-direction:column; gap: 48px;
  }
  .stub__nav{
    display:flex; justify-content:space-between; align-items:center;
    font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
  }
  .stub__nav a{ color:var(--fg-dim); transition:color .3s var(--ease);}
  .stub__nav a:hover{color:var(--fg);}
  .stub__hero{
    display:grid; grid-template-columns: 1.1fr 1fr; gap: 64px;
    align-items:center;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    padding: 64px 0;
  }
  @media (max-width: 1200px){ .stub__hero{grid-template-columns:1fr; gap:40px} }
  .stub__eyebrow{ margin-bottom:24px;}
  .stub__name{
    font-family:var(--display); font-weight:500;
    font-size: clamp(48px, 6.5vw, 104px);
    line-height:1; letter-spacing:-.03em;
    overflow-wrap: break-word; word-break: normal;
  }
  .stub__tagline{
    margin-top: 40px; font-size:20px; line-height:1.5; color: var(--fg-dim); max-width: 40ch;
  }
  .stub__logo{
    display:flex; align-items:center; justify-content:center;
    aspect-ratio: 5/4;
    background:#050505; border:1px solid var(--line);
    padding: 48px;
  }
  .stub__logo--inverse{ background: var(--bg-alt); color:#0A0A0A;}
  .stub__logo svg{ width: min(80%, 340px); height:auto; }

  .stub__body{
    display:grid; grid-template-columns: 1fr 1fr; gap: 64px;
  }
  @media (max-width: 900px){ .stub__body{grid-template-columns:1fr; gap:32px} }
  .stub__body h3{
    font-family:var(--display); font-weight:500;
    font-size: 28px; letter-spacing:-.01em;
    margin-bottom: 20px;
  }
  .stub__body p{ color:var(--fg); line-height:1.65; margin-bottom:16px; font-size:16px;}
  .stub__services{list-style:none;}
  .stub__services li{
    padding: 18px 0; border-top:1px solid var(--line);
    display:flex; justify-content:space-between; gap:24px;
    font-size:16px;
  }
  .stub__services li:last-child{border-bottom:1px solid var(--line);}
  .stub__services li span{
    color:var(--fg-dim); font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase;
  }

  .stub__coming{
    padding: 48px;
    border:1px dashed var(--line-strong);
    display:flex; align-items:center; gap:24px; flex-wrap:wrap; justify-content:space-between;
  }
  .stub__coming h4{
    font-family:var(--display); font-weight:500; font-size:24px; letter-spacing:-.01em;
  }
  .stub__coming p{ color: var(--fg-dim); max-width:50ch; margin-top:6px; font-size:14px;}

  .stub__cta{ display:flex; gap:16px; flex-wrap:wrap; }
  .stub__cta .btn{ width:auto; padding: 16px 24px;}
  .stub__cta .ghost{
    padding: 16px 24px;
    border:1px solid var(--line-strong); border-radius:999px;
    font-family:var(--display); font-weight:500;
    transition: border-color .3s var(--ease);
  }
  .stub__cta .ghost:hover{ border-color: var(--fg);}

  .stub__other{
    margin-top: 40px;
    padding-top:32px; border-top:1px solid var(--line);
  }
  .stub__other-title{
    font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--fg-dim); margin-bottom:24px;
  }
  .stub__other-grid{
    display:grid; grid-template-columns: repeat(4, 1fr); gap:1px;
    background:var(--line);
    border: 1px solid var(--line);
  }
  @media (max-width: 900px){ .stub__other-grid{grid-template-columns: repeat(2, 1fr);} }
  .stub__other-grid a{
    background:var(--bg);
    padding: 24px;
    display:flex; flex-direction:column; gap:8px;
    transition: background .3s var(--ease);
  }
  .stub__other-grid a:hover{ background:#050505;}
  .stub__other-grid a.inverse{ background:var(--bg-alt); color:#0A0A0A;}
  .stub__other-grid a.inverse:hover{ background: #ECECE8;}
  .stub__other-name{
    font-family:var(--display); font-weight:600; font-size:20px; letter-spacing:-.01em;
  }
  .stub__other-desc{
    font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--fg-dim);
  }
  .stub__other-grid a.inverse .stub__other-desc{ color:#666660;}
</style>
</head>
<body>

<main class="stub" id="stub">
  <div class="stub__nav">
    <a href="../index.html">← MARVELOUS GROUP</a>
    <a href="../index.html#contacts">Связаться →</a>
  </div>

  <div id="content"><!-- filled by JS --></div>
</main>

<script src="../agencies.js"></script>
<script>
(function(){
  const slug = "cartel";
  const AGENCIES = window.AGENCIES || [];
  const invertedIds = new Set(["now", "ai"]);
  const a = AGENCIES.find(x => x.slug === slug) || AGENCIES[0];

  const others = AGENCIES.filter(x => x.slug !== a.slug).slice(0, 4);

  const el = document.getElementById("content");
  el.innerHTML = `
    <section class="stub__hero">
      <div>
        <div class="mono stub__eyebrow">агентство · ${a.tag}</div>
        <h1 class="stub__name">${a.nameFull}</h1>
        <p class="stub__tagline">${a.tagline}</p>
      </div>
      <div class="stub__logo ${invertedIds.has(a.id) ? "stub__logo--inverse" : ""}">${a.logo}</div>
    </section>

    <section class="stub__body">
      <div>
        <h3>О агентстве</h3>
        ${a.about.map(p => `<p>${p}</p>`).join("")}
      </div>
      <div>
        <h3>Услуги</h3>
        <ul class="stub__services">
          ${a.services.map(s => `<li><strong>${s[0]}</strong><span>${s[1]}</span></li>`).join("")}
        </ul>
      </div>
    </section>

    <section class="stub__coming">
      <div>
        <h4>Полноценный сайт агентства — скоро</h4>
        <p>Это страница-заглушка. Здесь появятся кейсы, команда, клиенты и форма заявки именно под это агентство.</p>
      </div>
      <div class="stub__cta">
        <a class="btn" href="../index.html#contacts">
          <span>Обсудить проект</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 13L13 3M13 3H6M13 3V10" stroke="currentColor" stroke-width="1.5"/></svg>
        </a>
        <a class="ghost" href="../index.html#ecosystem">Все агентства</a>
      </div>
    </section>

    <section class="stub__other">
      <div class="stub__other-title">— другие агентства группы</div>
      <div class="stub__other-grid">
        ${others.map(o => `
          <a href="${o.slug}.html" class="${invertedIds.has(o.id) ? "inverse" : ""}">
            <span class="stub__other-desc">0${AGENCIES.indexOf(o)+1} / ${o.tag}</span>
            <span class="stub__other-name">${o.nameFull}</span>
          </a>
        `).join("")}
      </div>
    </section>
  `;

  document.title = `${a.nameFull} — MARVELOUS GROUP`;
})();
</script>

</body>
</html>
